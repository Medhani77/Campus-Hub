<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - ORYN Campus Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0a2540;
            --primary-blue: #1e4d7b;
            --accent-gold: #d4a574;
            --accent-coral: #e07856;
            --neutral-100: #ffffff;
            --neutral-200: #f5f7fa;
            --neutral-300: #e1e8ed;
            --neutral-700: #2c3e50;
            --font-display: 'Fraunces', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --shadow-md: 0 4px 16px rgba(10, 37, 64, 0.12);
            --shadow-lg: 0 8px 32px rgba(10, 37, 64, 0.16);
        }

        body {
            font-family: var(--font-body);
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-blue) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .registration-container {
            max-width: 800px;
            width: 100%;
            background: var(--neutral-100);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reg-header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue));
            color: white;
            padding: 3rem 3rem 2rem;
            text-align: center;
            position: relative;
        }

        .reg-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-coral), transparent);
        }

        .reg-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 1.5rem;
            backdrop-filter: blur(10px);
        }

        .reg-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .reg-header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .reg-form {
            padding: 3rem;
        }

        .form-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.3rem;
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent-gold);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: var(--neutral-700);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group label .required {
            color: var(--accent-coral);
        }

        .form-input {
            padding: 0.9rem 1rem;
            border: 2px solid var(--neutral-300);
            border-radius: 10px;
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all 0.3s;
            background: var(--neutral-100);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        select.form-input {
            cursor: pointer;
        }

        .form-note {
            font-size: 0.85rem;
            color: var(--neutral-700);
            opacity: 0.7;
            margin-top: 0.3rem;
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background: var(--neutral-200);
            border-radius: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 0.2rem;
            cursor: pointer;
            accent-color: var(--accent-gold);
        }

        .checkbox-group label {
            flex: 1;
            font-size: 0.95rem;
            color: var(--neutral-700);
            cursor: pointer;
        }

        .btn-container {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-coral));
            color: white;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.4);
        }

        .btn-secondary {
            background: var(--neutral-300);
            color: var(--neutral-700);
        }

        .btn-secondary:hover {
            background: var(--neutral-700);
            color: white;
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--neutral-300);
            color: var(--neutral-700);
        }

        .login-link a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: var(--accent-coral);
            text-decoration: underline;
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .strength-bar {
            height: 4px;
            background: var(--neutral-300);
            border-radius: 2px;
            margin-top: 0.3rem;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #10b981; width: 100%; }
    </style>
</head>
<body>
    <div class="registration-container">
        <div class="reg-header">
            <div class="reg-icon">🎓</div>
            <h1>Student Registration</h1>
            <p>Join CINEC Campus Hub Community</p>
        </div>

        <form class="reg-form" id="registrationForm" onsubmit="handleRegistration(event)">
           
            <div class="form-section">
                <h2 class="section-title">Personal Information</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name <span class="required">*</span></label>
                        <input type="text" class="form-input" name="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name <span class="required">*</span></label>
                        <input type="text" class="form-input" name="lastName" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Date of Birth <span class="required">*</span></label>
                        <input type="date" class="form-input" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label>Gender <span class="required">*</span></label>
                        <select class="form-input" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                            <option value="prefer-not">Prefer not to say</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" class="form-input" name="email" required>
                    <span class="form-note">Use your personal email address</span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Mobile Number <span class="required">*</span></label>
                        <input type="tel" class="form-input" name="mobile" placeholder="+94 XX XXX XXXX" required>
                    </div>
                    <div class="form-group">
                        <label>NIC Number <span class="required">*</span></label>
                        <input type="text" class="form-input" name="nic" placeholder="XXXXXXXXXV or XXXXXXXXXXXX" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Address <span class="required">*</span></label>
                    <input type="text" class="form-input" name="address" required>
                </div>
            </div>

       
            <div class="form-section">
                <h2 class="section-title">Academic Information</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Index Number <span class="required">*</span></label>
                        <input type="text" class="form-input" name="indexNo" placeholder="EG/2024/IT/XXXX" required>
                    </div>
                    <div class="form-group">
                        <label>Faculty <span class="required">*</span></label>
                        <select class="form-input" name="faculty" required>
                            <option value="">Select Faculty</option>
                            <option value="engineering">Faculty of Engineering Technology</option>
                            <option value="management">Faculty of Management Studies</option>
                            <option value="nautical">Faculty of Nautical Studies</option>
                            <option value="aviation">Faculty of Aviation</option>
                            <option value="social">Faculty of Social Sciences & Humanities</option>
                            <option value="graduate">Faculty of Graduate Studies</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Programme <span class="required">*</span></label>
                        <select class="form-input" name="programme" required>
                            <option value="">Select Programme</option>
                            <option value="bsc-it">BSc (Hons) in Information Technology</option>
                            <option value="bsc-cs">BSc (Hons) in Computer Science</option>
                            <option value="beng-software">BEng (Hons) in Software Engineering</option>
                            <option value="bba">BBA (Hons) in Business Administration</option>
                            <option value="bsc-aviation">BSc (Hons) in Aviation Management</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Year of Study <span class="required">*</span></label>
                        <select class="form-input" name="year" required>
                            <option value="">Select Year</option>
                            <option value="1">Year 1</option>
                            <option value="2">Year 2</option>
                            <option value="3">Year 3</option>
                            <option value="4">Year 4</option>
                        </select>
                    </div>
                </div>
            </div>

            
            <div class="form-section">
                <h2 class="section-title">Account Information</h2>
                
                <div class="form-group">
                    <label>Username <span class="required">*</span></label>
                    <input type="text" class="form-input" name="username" required>
                    <span class="form-note">This will be used for login</span>
                </div>

                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" class="form-input" name="password" id="password" required>
                    <div class="password-strength">
                        <span id="strengthText">Password strength</span>
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                    </div>
                    <span class="form-note">Minimum 8 characters with letters and numbers</span>
                </div>

                <div class="form-group">
                    <label>Confirm Password <span class="required">*</span></label>
                    <input type="password" class="form-input" name="confirmPassword" required>
                </div>
            </div>

            
            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">
                    I agree to the <a href="#" style="color: var(--accent-gold); text-decoration: none;">Terms and Conditions</a> and <a href="#" style="color: var(--accent-gold); text-decoration: none;">Privacy Policy</a>. I understand that my information will be used in accordance with CINEC's data protection policies.
                </label>
            </div>

        
            <div class="btn-container">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
                <button type="submit" class="btn btn-primary">Complete Registration</button>
            </div>

        
            <div class="login-link">
                Already have an account? <a href="index.html">Sign In</a>
            </div>
        </form>
    </div>

    <script>
     
        const passwordInput = document.getElementById('password');
        const strengthText = document.getElementById('strengthText');
        const strengthFill = document.getElementById('strengthFill');

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;

            strengthFill.className = 'strength-fill';
            if (strength === 0) {
                strengthText.textContent = 'Password strength';
            } else if (strength <= 2) {
                strengthFill.classList.add('strength-weak');
                strengthText.textContent = 'Weak password';
            } else if (strength === 3) {
                strengthFill.classList.add('strength-medium');
                strengthText.textContent = 'Medium password';
            } else {
                strengthFill.classList.add('strength-strong');
                strengthText.textContent = 'Strong password';
            }
        });

        
        function handleRegistration(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

           
            if (data.password !== data.confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

          
            if (data.password.length < 8) {
                alert('Password must be at least 8 characters long!');
                return;
            }

           
            if (!data.terms) {
                alert('Please accept the terms and conditions!');
                return;
            }

            
            fetch('http://localhost:3000/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    fullName: `${data.firstName} ${data.lastName}`,
                    email: data.email,
                    mobile: data.mobile,
                    nic: data.nic,
                    address: data.address,
                    indexNo: data.indexNo,
                    faculty: data.faculty,
                    programme: data.programme,
                    year: data.year,
                    username: data.username,
                    password: data.password,
                    dob: data.dob,
                    gender: data.gender
                })
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    alert(`✅ Registration Successful!\n\nWelcome ${data.firstName}! Your account has been created.\nIndex: ${data.indexNo}\n\nYou can now login with your credentials.`);
                    window.location.href = 'index.html';
                } else {
                    alert('❌ Registration Failed: ' + (result.message || 'Please try again'));
                }
            })
            .catch(err => {
                console.error(err);
                // For demo purposes - simulate success
                alert(`✅ Registration Successful!\n\nWelcome ${data.firstName}! Your account has been created.\nIndex: ${data.indexNo}\n\nYou can now login with your credentials.`);
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            });
        }

        
        document.querySelector('[name="indexNo"]').addEventListener('input', function(e) {
            let value = e.target.value.toUpperCase().replace(/[^A-Z0-9\/]/g, '');
            e.target.value = value;
        });

       
        document.querySelector('[name="nic"]').addEventListener('input', function(e) {
            let value = e.target.value.toUpperCase().replace(/[^0-9VX]/g, '');
            e.target.value = value;
        });

        
        document.querySelector('[name="mobile"]').addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^0-9+\s]/g, '');
            e.target.value = value;
        });
    </script>
</body>
</html>
